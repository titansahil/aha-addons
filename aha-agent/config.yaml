# =============================================================================
# AHA Agent — Home Assistant add-on manifest (config.yaml)
# =============================================================================
# This file tells Home Assistant Supervisor how to install, configure, and run
# the AHA box agent (box_client.py) as an add-on.
#
# WHAT THE AGENT DOES (the "switchboard / P2P" model):
#   On boot the agent auto-discovers the cameras in the box's local go2rtc,
#   registers the box + that camera list with the AHA cloud, then opens an
#   OUTBOUND WebSocket to the cloud and holds it open. The cloud is only a
#   switchboard: it relays a viewer's WebRTC *offer* to this box over that
#   socket and returns the box's *answer*. After that handshake, live video
#   flows phone <-> box DIRECTLY (P2P, DTLS-SRTP) and NEVER through the cloud.
#
# REPURPOSE-TO-ANY-BOX:
#   This same add-on runs on ANY Home Assistant box with almost nothing for the
#   customer to type. The box's device id is assigned AUTOMATICALLY (derived from the
#   host NIC MAC, else machine-id, else a persisted random id); pairing is done by the
#   APP, which declares (device_id, home_code) to the cloud (/provision_box); the AHA
#   cloud URL is set ONCE at install time (the `backend_url` option, written by the
#   install script — NOT hardcoded); and go2rtc is always local at 127.0.0.1:1984
#   (baked). The agent then auto-discovers whatever cameras the local go2rtc exposes.
# =============================================================================

name: AHA Agent
version: "1.0.1"
slug: aha_agent
description: AHA box agent — dials out to the AHA cloud and bridges WebRTC signaling to local go2rtc (video stays peer-to-peer)

# Architectures we publish for. arm64/amd64 cover the vast majority of HA boxes
# (HA Green, Yellow, Pi 4/5 64-bit, generic x86 NUCs); armv7 covers older Pis.
# These MUST match the platforms produced by build-and-push.sh when you switch
# to a prebuilt `image:` (see the README "Prebuilt image" section).
arch:
  - aarch64
  - amd64
  - armv7

# -----------------------------------------------------------------------------
# Runtime behaviour
# -----------------------------------------------------------------------------
# host_network: true  -> the agent shares the host's network namespace so it can
#   reach the LAN go2rtc (e.g. http://192.168.x.x:1984) and so go2rtc's WebRTC
#   media ports (UDP/TCP 8555) are reachable for P2P. The agent itself only
#   makes OUTBOUND connections (to the cloud and to local go2rtc); it opens no
#   inbound listening port of its own.
host_network: true

# boot: auto       -> start automatically when Home Assistant boots, so the box
#   re-registers and reconnects with no human intervention after a power cycle.
boot: auto

# startup: application -> this is an ordinary long-running app (not a system/
#   service-tier add-on); start it in the normal application phase.
startup: application

# init: false -> use the base image's own init/CMD (our Dockerfile's CMD runs
#   python directly); we don't need HA's legacy s6 init wrapper.
init: false

# homeassistant_api: true -> Home Assistant hands the add-on a SUPERVISOR_TOKEN so
#   the agent can call HA's own API. We use it to raise the "claim your box"
#   notification (persistent_notification.create). Without this grant the agent
#   still runs; it just falls back to printing the claim code in its log.
homeassistant_api: true

# hassio_api: true -> lets the agent call the SUPERVISOR API directly
#   (http://supervisor/...). We use /network/info to read the HOST's primary
#   NIC MAC for a durable device id that survives add-on reinstalls (the
#   container machine-id does not). Without this grant the agent falls back to
#   reading /sys/class/net (works because host_network is on) and then to the
#   machine-id, so it still functions; the Supervisor path is just the cleanest.
hassio_api: true

# -----------------------------------------------------------------------------
# Add-on options — DELIBERATELY MINIMAL. Only TWO keys, and both are OPTIONAL, so
# Supervisor can never reject the install with a "missing required option" error
# and the customer never types anything:
#   * backend_url: the AHA cloud this box dials into. NOT hardcoded — the public
#     repo ships it EMPTY; the install script writes it at install time. (The
#     "non-hardcoded repository" requirement: no server address baked into the agent.)
#   * box_name:    friendly label shown in the app. The app can rename a box, so this
#     is just the initial label; leaving it at "My Box" is fine.
#
# EVERYTHING ELSE WAS REMOVED FROM THE CONFIG ON PURPOSE:
#   * register_key — RETIRED. Pairing is per-box TOFU + an app-minted single-use
#     bootstrap token; there is no shared key anymore.
#   * cameras / camera_include / camera_exclude / onvif_username / onvif_password —
#     camera credentials are PUSHED BY THE APP at pair time (LAN /provision, then
#     configure_cameras over the cloud socket) and persisted on the box. They were
#     only ever a config-side backup. box_client.py still honours the matching env
#     vars (AHA_CAMERAS, AHA_ONVIF_USER/PASS, AHA_CAMERA_INCLUDE/EXCLUDE) as a dev
#     escape hatch, so nothing is lost — they're just no longer add-on options.
#   * device_id is auto-assigned (host MAC); go2rtc is always local at 127.0.0.1:1984
#     (AHA_GO2RTC_PORT env overrides for the rare non-default port).
# -----------------------------------------------------------------------------
options:
  backend_url: ""        # AHA cloud URL — written by the install script at install time
  box_name: "My Box"     # friendly label shown in the app (optional; the app can rename)

# -----------------------------------------------------------------------------
# Schema = validation for the two options above. Both are OPTIONAL ("str?") on
# purpose: with no required key, the install-time options call can never fail
# validation regardless of which keys it sends.
# -----------------------------------------------------------------------------
schema:
  backend_url: str?
  box_name: str?
